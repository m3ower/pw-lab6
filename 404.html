<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // Redirect SPA routes back to index.html with path encoded as query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
