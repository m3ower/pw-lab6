<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Restore path from 404.html redirect
      (function() {
        var p = window.location.search.slice(1).split('&')[0];
        if (p.indexOf('p=') === 0) {
          window.history.replaceState(null, null,
            '/' + decodeURIComponent(p.slice(2)) + window.location.hash
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Shelf — Personal Reading Library</title>
    <meta name="description" content="Track your reading, add chapter notes, and manage your personal book collection." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
